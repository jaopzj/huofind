[phases.setup]
nixPkgs = ["nodejs_20", "npm-9_x"]
aptPkgs = [
    "libglib2.0-0", "libx11-6", "libxext6", "libxrender1",
    "libxrandr2", "libgconf-2-4", "libatk1.0-0", "libatk-bridge2.0-0",
    "libpango-1.0-0", "libpangoft2-1.0-0", "libfontconfig1", "libfreetype6",
    "libxcursor1", "libxinerama1", "libxi6", "libxss1",
    "libxtst6", "libxcomposite1", "libxdamage1", "libxfixes3",
    "libxkbcommon0", "libdbus-1-3", "libgbm1", "libnss3",
    "libnspr4", "libcups2", "libpulse0", "libasound2",
    "libexpat1", "libflac8", "libopus0", "libvorbis0a",
    "libvorbisenc2", "libdrm2", "libxshmfence1", "libx11-xcb1",
    "libxcb1", "libatspi2.0-0", "libcairo2"
]

[phases.install]
cmds = ["npm install", "npx playwright install chromium --with-deps"]

[start]
cmd = "node server.js"
