[phases.setup]
nixPkgs = ["nodejs_20", "npm-9_x"]
aptPkgs = [
    "libglib2.0-0",
    "libnss3", "libatk1.0-0", "libatk-bridge2.0-0", "libcups2",
    "libdrm2", "libxkbcommon0", "libxcomposite1", "libxdamage1",
    "libxrandr2", "libgbm1", "libpango-1.0-0", "libcairo2",
    "libasound2", "libxshmfence1", "libx11-xcb1", "libxcb1",
    "libxfixes3", "libxext6", "libx11-6", "libdbus-1-3",
    "libatspi2.0-0", "libnspr4", "libgobject-2.0-0",
    "fonts-liberation", "libexpat1"
]

[phases.install]
cmds = ["npm install", "npx playwright install chromium --with-deps"]

[start]
cmd = "node server.js"
